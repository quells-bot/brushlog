server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Defined once here; referenced in every location block because nginx's
    # add_header inheritance is reset whenever a child block defines its own
    # add_header directives.
    set $csp "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'";

    # Serve pre-built assets directly; fall back to the SPA shell (404.html)
    # for any path the static adapter didn't prerender.
    location / {
        add_header Content-Security-Policy $csp always;
        try_files $uri $uri/ /404.html;
    }

    # Long-lived cache for hashed assets; no-cache for entry points.
    location ~* \.(js|css|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Security-Policy $csp always;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy $csp always;
    }

    # Alpine nginx's mime.types doesn't include webmanifest; set it explicitly.
    location ~* \.webmanifest$ {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy $csp always;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
